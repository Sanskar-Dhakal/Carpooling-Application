version: '3.9'

services:

  postgres:
    image: postgres:15-alpine
    container_name: vroomsquad_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: vroomuser
      POSTGRES_PASSWORD: vroompass
      POSTGRES_DB: vroomsquad
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vroomuser -d vroomsquad"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: vroomsquad_redis
    restart: unless-stopped
    ports:
      - "6381:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
  redis_data:
