name: carpooling_app
description: Vroom Squad - Carpooling Application
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5

  # Navigation
  go_router: ^13.0.0

  # HTTP
  http: ^1.2.0
  dio: ^5.4.0

  # Local Storage
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.2

  # Firebase
  firebase_core: ^2.27.0
  firebase_auth: ^4.17.0
  firebase_messaging: ^14.7.19
  google_sign_in: ^6.2.1

  # Maps
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  geolocator: ^11.0.0

  # QR Code
  qr_flutter: ^4.1.0
  mobile_scanner: ^3.5.6

  # Image
  image_picker: ^1.0.7
  cached_network_image: ^3.3.1

  # UI
  cupertino_icons: ^1.0.6
  shimmer: ^3.0.0
  fluttertoast: ^8.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/

flutter_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"